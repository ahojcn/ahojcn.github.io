<p><strong>注意：</strong></p>
<p>需要启用 22 端口，还有关闭防火墙(因为是在实验室的内网环境下测试，所以直接关闭了)，一般不要随便关闭防火墙，具体的配置一下就行。</p>
<p><strong>关闭防火墙：</strong></p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">iptables -F         #清除防火墙规则</span><br><span class="line">iptables -L         #查看</span><br></pre></td></tr></table></figure>
<p><strong>启用 22 端口：</strong></p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br></pre></td><td class="code"><pre><span class="line">默认没有打开ssh的22端口</span><br><span class="line">解决的办法是</span><br><span class="line">sudo apt-get install openssh-server</span><br><span class="line"> </span><br><span class="line">sudo apt-get install ufw</span><br><span class="line"> </span><br><span class="line">sudo ufw enable</span><br><span class="line"> </span><br><span class="line">sudo ufw allow 22</span><br></pre></td></tr></table></figure>
